{% extends "base.html" %}

{% block content %}
<body>
    <main class="main-content">
        
        <div class="page-header">
            <h2>System Reports</h2>
            <a href="{{ url_for('export_csv') }}">
                <button class="action-btn export-btn"><i class="fa-solid fa-download"></i> Export to CSV</button>
            </a>
        </div>

        <div class="controls-container date-filters">
            <form method="get" action="{{ url_for('reports') }}" style="display:flex; gap:0.5rem; align-items:center;">
                <div class="search-box">
                    <span style="padding-left: 15px; color: rgba(255,255,255,0.7);">From:</span>
                    <input type="date" name="date_from" value="{{ date_from }}" style="padding-left: 10px;">
                </div>
                <div class="search-box">
                    <span style="padding-left: 15px; color: rgba(255,255,255,0.7);">To:</span>
                    <input type="date" name="date_to" value="{{ date_to }}" style="padding-left: 10px;">
                </div>
                <button class="action-btn generate-btn" type="submit">Generate Report</button>
            </form>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-info">
                    <p>Total Borrows</p>
                    <h3>{{ total_borrows }}</h3>
                </div>
                <i class="fa-solid fa-handshake"></i>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <p>Most Borrowed</p>
                    <h3 style="font-size: 20px; margin-top: 8px;">{{ most_borrowed }}</h3>
                </div>
                <i class="fa-solid fa-star"></i>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <p>Damage/Lost Reports</p>
                    <h3 style="color: #f87171;">{{ damage_reports }}</h3>
                </div>
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
        </div>

        <div class="chart-container">
            <h3>Borrowing Activity (Past 7 Days)</h3>
            <div class="css-chart">
                {% for d in daily_counts %}
                <div class="bar-group">
                    <div class="bar" style="height: {{ d.height }}%;"></div>
                    <span>{{ d.day }}</span>
                </div>
                {% endfor %}
            </div>
        </div>

    </main>
</body>
{% endblock %}
