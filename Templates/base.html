<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Admin Dashboard - Inventory Management{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel ="icon" type ="image/png" href="{{ url_for('static', filename='img/CSU-logo.png') }}">
</head>
<body>

    <div class="dashboard-overlay"></div>

    <nav class="sidebar">
        <div>
            <h2>Admin Panel</h2>
        </div>

        <ul class="nav-links">
            <li><a href="{{ url_for('admin_dashboard') }}" class="active"><i class="fa-solid fa-border-all"></i> Dashboard</a></li>
            <li><a href="{{ url_for('inventory') }}"><i class="fa-solid fa-box-open"></i> Manage Inventory</a></li>
            <li><a href="{{ url_for('office') }}"><i class="fa-solid fa-users"></i> Office</a></li>
            <li><a href="{{ url_for('requests') }}"><i class="fa-solid fa-clipboard-list"></i> Manage Requests</a></li>
            <li><a href="{{ url_for('borrowed_items') }}"><i class="fa-solid fa-book-open"></i> Borrowed Items</a></li>
            <li><a href="{{ url_for('reports') }}"><i class="fa-solid fa-file-lines"></i> Reports</a></li>
        </ul>

        <div class="logout">
            <a href="{{ url_for('admin') }}"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
        </div>
    </nav>

<!-- Main section -->

<div class="main">



    <div class="content">

        {% block content %}
        {% endblock %}

    </div>

</div>

</body>
</html>
